<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sfondo blu navy elegante -->
  <rect width="512" height="512" rx="96" fill="#1b2a4a"/>

  <!-- Green del campo - collinette -->
  <ellipse cx="256" cy="440" rx="280" ry="100" fill="#2d8a4e"/>
  <ellipse cx="150" cy="420" rx="160" ry="70" fill="#34a058"/>
  <ellipse cx="380" cy="430" rx="140" ry="60" fill="#2d8a4e"/>

  <!-- Cielo sfumato -->
  <circle cx="400" cy="80" r="40" fill="#f0c040" opacity="0.15"/>

  <!-- Bandierina -->
  <line x1="340" y1="180" x2="340" y2="380" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="342,180 342,215 385,197" fill="#e8363a"/>
  <polygon points="342,180 342,200 370,190" fill="#ff5252" opacity="0.7"/>

  <!-- Buca -->
  <ellipse cx="340" cy="382" rx="18" ry="6" fill="#1a5c2e"/>
  <ellipse cx="340" cy="380" rx="12" ry="4" fill="#0d3318"/>

  <!-- Sacca da golf elegante -->
  <g transform="translate(190,255)">
    <!-- Ombra -->
    <ellipse cx="5" cy="120" rx="50" ry="10" fill="#1a3d20" opacity="0.5"/>

    <!-- Corpo sacca - pelle marrone elegante -->
    <rect x="-42" y="-55" width="84" height="140" rx="12" fill="#6B3A2A"/>
    <rect x="-42" y="-55" width="84" height="70" rx="12" fill="#7D4530"/>
    <!-- Striscia oro -->
    <rect x="-42" y="12" width="84" height="6" fill="#c9a84c"/>
    <!-- Dettaglio tasca -->
    <rect x="-30" y="30" width="60" height="40" rx="6" fill="#5a3020" opacity="0.5"/>
    <rect x="-30" y="30" width="60" height="3" rx="1" fill="#c9a84c" opacity="0.5"/>

    <!-- Top sacca -->
    <rect x="-48" y="-72" width="96" height="24" rx="7" fill="#4a2518"/>
    <rect x="-48" y="-72" width="96" height="12" rx="7" fill="#5a3020"/>

    <!-- Mazza 1 - Driver -->
    <rect x="-22" y="-148" width="4.5" height="90" rx="2" fill="#c0c0c0"/>
    <ellipse cx="-20" cy="-153" rx="13" ry="11" fill="#2c2c2c"/>
    <ellipse cx="-20" cy="-153" rx="10" ry="8" fill="#3a3a3a"/>

    <!-- Mazza 2 - Iron -->
    <rect x="2" y="-155" width="4" height="97" rx="2" fill="#d0d0d0"/>
    <rect x="-2" y="-166" width="12" height="15" rx="1.5" fill="#a0a0a0"/>
    <rect x="-2" y="-166" width="12" height="5" rx="1.5" fill="#c0c0c0"/>

    <!-- Mazza 3 - Putter -->
    <rect x="22" y="-138" width="4" height="80" rx="2" fill="#c9a84c"/>
    <rect x="17" y="-143" width="14" height="8" rx="2" fill="#b08830"/>
    <rect x="17" y="-143" width="14" height="4" rx="2" fill="#c9a84c"/>

    <!-- Grip colorati -->
    <rect x="-24" y="-80" width="9" height="14" rx="2" fill="#1a5c8a"/>
    <rect x="0" y="-80" width="8" height="14" rx="2" fill="#c43030"/>
    <rect x="20" y="-80" width="8" height="14" rx="2" fill="#c9a84c"/>
  </g>

  <!-- Pallina da golf -->
  <circle cx="300" cy="370" r="14" fill="white"/>
  <circle cx="296" cy="366" r="1.8" fill="#e0e0e0"/>
  <circle cx="303" cy="365" r="1.3" fill="#e0e0e0"/>
  <circle cx="300" cy="373" r="1.3" fill="#e0e0e0"/>
  <circle cx="294" cy="372" r="1" fill="#e8e8e8"/>
  <circle cx="305" cy="370" r="1" fill="#e8e8e8"/>

  <!-- Testo su due righe -->
  <text x="256" y="452" text-anchor="middle" dominant-baseline="central"
        font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="900"
        fill="#c9a84c" letter-spacing="5">
    CADDIE
  </text>
  <text x="256" y="496" text-anchor="middle" dominant-baseline="central"
        font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="900"
        fill="#c9a84c" letter-spacing="5">
    MASTER
  </text>
</svg>
